<!DOCTYPE html>
<html lang="en">
<head>
      <link rel="icon" href="/static/images/icon.png">
<link
rel="manifest"
href="/static/manifest.json">
    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Edit Student</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f8f6f1;
        }

        .header{
            background: #151515;
            color: white;
            padding: 20px;
        }

        .header h1{
            font-size: 24px;
        }

        .container{
            max-width: 550px;
            margin: 30px auto;
            padding: 20px;
        }

        .form-card{
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .form-card p{
            margin-bottom: 18px;
        }

        .form-card label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-card input,
        .form-card select,
        .form-card textarea{
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        .form-card input:focus,
        .form-card select:focus,
        .form-card textarea:focus{
            border-color: #d43a2f;
        }

        .update-btn{
            width: 100%;
            background: #d43a2f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .update-btn:hover{
            background: #b92f26;
        }

        @media(max-width:480px){

            .container{
                padding: 15px;
            }

            .form-card{
                padding: 20px;
            }
        }

    </style>
</head>
<body>

    <div class="header">

        <h1>

            Edit Student

        </h1>

    </div>

    <div class="container">

        <div class="form-card">

            <form
            method="POST"
            enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                type="submit"
                class="update-btn">

                    UPDATE STUDENT

                </button>

            </form>

        </div>

    </div>

</body>
</html>
